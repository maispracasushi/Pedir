
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mais Praça Sushi</title>

<style>

body{
margin:0;
padding:0;
font-family:Arial, Helvetica, sans-serif;
color:white;

/* FUNDO */
background:linear-gradient(
rgba(0,0,0,0.7),
rgba(0,0,0,0.7)
),
url("fundo.jpg");

background-size:cover;
background-position:center;
background-repeat:no-repeat;
height:100vh;

display:flex;
justify-content:center;
align-items:center;
text-align:center;
}

/* CARD CENTRAL */

.card{
background:rgba(0,0,0,0.55);
backdrop-filter:blur(6px);
padding:40px;
border-radius:14px;
max-width:520px;
width:90%;
box-shadow:0 10px 40px rgba(0,0,0,0.6);
animation:fade 1.5s ease;
}

.logo{
width:200px;
margin-bottom:20px;
}

.location{
font-size:15px;
opacity:0.9;
margin-bottom:10px;
}

h1{
font-size:34px;
margin:10px 0;
}

p{
font-size:18px;
margin-bottom:25px;
}

.buttons{
display:flex;
gap:15px;
justify-content:center;
flex-wrap:wrap;
}

.btn{
text-decoration:none;
padding:14px 24px;
border-radius:10px;
font-size:16px;
font-weight:bold;
color:white;
transition:0.3s;
box-shadow:0 4px 15px rgba(0,0,0,0.4);
}

.btn:hover{
transform:translateY(-3px);
}

.whatsapp{
background:#25D366;
}

.instagram{
background:#E1306C;
}

/* ANIMAÇÃO */

@keyframes fade{
from{
opacity:0;
transform:translateY(20px);
}
to{
opacity:1;
transform:translateY(0);
}
}

</style>
</head>

<body>

<div class="card">

<img src="logo.png" class="logo" alt="Mais Praça Sushi">

<div class="location">
📍 Ribeirão Preto - SP
</div>

<h1>Em breve</h1>

<p>
Estamos finalizando nosso cardápio para inauguração em breve.<br>
<strong>Aguardem!</strong>
</p>

<div class="buttons">

<a class="btn whatsapp"
href="https://wa.me/5516996175950"
target="_blank">
WhatsApp
</a>

<a class="btn instagram"
href="https://www.instagram.com/maispracasushi"
target="_blank">
Instagram
</a>

</div>

</div>

</body>
</html>
