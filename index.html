
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Teste Firebase Auth</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body style="font-family:Arial; padding:40px;">

<h2>Teste Firebase Auth - Mais Pra Cá Sushi</h2>

<input id="email" type="email" placeholder="Email" style="width:100%;max-width:300px;height:40px;margin-bottom:10px;"><br>
<input id="senha" type="password" placeholder="Senha" style="width:100%;max-width:300px;height:40px;margin-bottom:20px;"><br>

<button onclick="cadastrar()" style="margin-right:10px;">Cadastrar</button>
<button onclick="entrar()" style="margin-right:10px;">Entrar</button>
<button onclick="recuperar()" style="margin-right:10px;">Esqueci senha</button>
<button onclick="sair()">Sair</button>

<p id="status" style="margin-top:20px;font-weight:bold;"></p>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import {
  getAuth,
  createUserWithEmailAndPassword,
  signInWithEmailAndPassword,
  sendPasswordResetEmail,
  signOut,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyAPrAKxCGTr-VtZJRsZQGIVxyL7k5Q88NI",
  authDomain: "maispracasushi-app.firebaseapp.com",
  projectId: "maispracasushi-app",
  storageBucket: "maispracasushi-app.firebasestorage.app",
  messagingSenderId: "263424174358",
  appId: "1:263424174358:web:7ce21faa2c2d6386d04837"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

window.cadastrar = function(){
  const email = document.getElementById("email").value;
  const senha = document.getElementById("senha").value;

  createUserWithEmailAndPassword(auth, email, senha)
    .then(()=> alert("Conta criada com sucesso!"))
    .catch(e=> alert(e.message));
};

window.entrar = function(){
  const email = document.getElementById("email").value;
  const senha = document.getElementById("senha").value;

  signInWithEmailAndPassword(auth, email, senha)
    .then(()=> alert("Login realizado!"))
    .catch(e=> alert(e.message));
};

window.recuperar = function(){
  const email = document.getElementById("email").value;

  sendPasswordResetEmail(auth, email)
    .then(()=> alert("Email de redefinição enviado!"))
    .catch(e=> alert(e.message));
};

window.sair = function(){
  signOut(auth);
};

onAuthStateChanged(auth, user=>{
  document.getElementById("status").innerText =
    user ? "Logado como: " + user.email : "Usuário deslogado";
});
</script>

</body>
</html>
