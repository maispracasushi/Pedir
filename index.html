
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mais Praça Sushi</title>

<style>

body{
margin:0;
padding:0;
font-family:Arial, Helvetica, sans-serif;
color:white;
overflow:hidden;

/* FUNDO COM IMAGEM */
background:linear-gradient(
rgba(0,0,0,0.65),
rgba(0,0,0,0.75)
),
url("fundo.jpg");

background-size:cover;
background-position:center;
background-repeat:no-repeat;
height:100vh;

display:flex;
justify-content:center;
align-items:center;
text-align:center;
}

/* BOKEH REALISTA */

.bokeh{
position:fixed;
width:100%;
height:100%;
top:0;
left:0;
pointer-events:none;
overflow:hidden;
}

.circle{
position:absolute;
border-radius:50%;
background:rgba(255,255,255,0.25);
filter:blur(8px);
animation:move 12s infinite linear;
}

.circle:nth-child(1){
width:120px;
height:120px;
left:10%;
top:80%;
animation-duration:18s;
}

.circle:nth-child(2){
width:80px;
height:80px;
left:25%;
top:70%;
animation-duration:14s;
}

.circle:nth-child(3){
width:140px;
height:140px;
left:50%;
top:85%;
animation-duration:20s;
}

.circle:nth-child(4){
width:100px;
height:100px;
left:70%;
top:75%;
animation-duration:16s;
}

.circle:nth-child(5){
width:90px;
height:90px;
left:85%;
top:80%;
animation-duration:17s;
}

@keyframes move{
0%{
transform:translateY(0);
opacity:0.3;
}
50%{
opacity:0.6;
}
100%{
transform:translateY(-200px);
opacity:0;
}
}

/* CARD */

.card{
background:rgba(0,0,0,0.55);
backdrop-filter:blur(6px);
padding:40px;
border-radius:14px;
max-width:520px;
width:90%;
box-shadow:0 10px 40px rgba(0,0,0,0.6);
animation:fade 1.2s ease;
position:relative;
z-index:2;
}

.logo{
width:200px;
margin-bottom:20px;
}

.location{
font-size:15px;
opacity:0.9;
margin-bottom:10px;
}

h1{
font-size:34px;
margin:10px 0;
}

p{
font-size:18px;
margin-bottom:25px;
}

.buttons{
display:flex;
gap:15px;
justify-content:center;
flex-wrap:wrap;
}

.btn{
text-decoration:none;
padding:14px 24px;
border-radius:10px;
font-size:16px;
font-weight:bold;
color:white;
transition:0.3s;
box-shadow:0 4px 15px rgba(0,0,0,0.4);
}

.btn:hover{
transform:translateY(-3px);
}

.whatsapp{
background:#25D366;
}

.instagram{
background:#E1306C;
}

/* ANIMAÇÃO ENTRADA */

@keyframes fade{
from{
opacity:0;
transform:translateY(20px);
}
to{
opacity:1;
transform:translateY(0);
}
}

</style>
</head>

<body>

<div class="bokeh">
<div class="circle"></div>
<div class="circle"></div>
<div class="circle"></div>
<div class="circle"></div>
<div class="circle"></div>
</div>

<div class="card">

<img src="logo.png" class="logo" alt="Mais Praça Sushi">

<div class="location">
📍 Ribeirão Preto - SP
</div>

<h1>Em breve</h1>

<p>
Estamos finalizando nosso cardápio para inauguração em breve.<br>
<strong>Aguardem!</strong>
</p>

<div class="buttons">

<a class="btn whatsapp"
href="https://wa.me/5516996175950"
target="_blank">
WhatsApp
</a>

<a class="btn instagram"
href="https://www.instagram.com/maispracasushi"
target="_blank">
Instagram
</a>

</div>

</div>

</body>
</html>
